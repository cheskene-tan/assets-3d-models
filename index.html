<!DOCTYPE html>
<html>
<head>
    <title>3D Asset Viewer</title>

    <script type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        html, body {
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
            background:#f2f2f2;
        }

        model-viewer{
            width:100%;
            height:100%;
        }

        #error{
            position:absolute;
            top:20px;
            left:20px;
            padding:15px;
            background:white;
            border-radius:8px;
            font-family:Arial;
            display:none;
        }
    </style>
</head>

<body>

<div id="error"></div>

<model-viewer
    id="viewer"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
</model-viewer>

<script>

const params = new URLSearchParams(window.location.search);

const assetId = params.get("assetid");

if(assetId){

    const model = `3d_models/${assetId}.glb`;

    const viewer = document.getElementById("viewer");

    viewer.src = model;

    viewer.addEventListener("error", () => {
        const err = document.getElementById("error");
        err.style.display="block";
        err.innerHTML =
            `<h3>Model not found</h3>
             Asset_ID: ${assetId}`;
    });

}
else{

    document.getElementById("error").style.display="block";
    document.getElementById("error").innerHTML =
        "No Asset ID supplied.";

}

</script>

</body>
</html>
